# MQTT Configuration for edge nodes
# Mosquitto broker - simple, lightweight for rural IoT

persistence true
persistence_location /mosquitto/data/

# Allow anonymous connections (can add ACL later)
allow_anonymous true

# Optimize for rural 2G/3G networks
max_connections -1
max_queued_messages 1000

# Clean on disconnect
persistent_client_expiration 30d

# Keep-alive
keepalive_interval 60

port 1883

# Optional: TLS certificate support for security
# listener 8883
# cafile /mosquitto/certs/ca.crt
# certfile /mosquitto/certs/server.crt
# keyfile /mosquitto/certs/server.key
