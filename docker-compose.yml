version: '3.8'

services:
  rural-india-ai:
    build: .
    container_name: rural-india-ai
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/data/logs
    environment:
      - PYTHONUNBUFFERED=1
      - EDGE_MODE=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - rural-network

  # Optional: Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: rural-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - rural-network
    depends_on:
      - rural-india-ai

  # Optional: Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: rural-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    restart: unless-stopped
    networks:
      - rural-network
    depends_on:
      - prometheus

networks:
  rural-network:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
